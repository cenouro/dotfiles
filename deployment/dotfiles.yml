# vim: filetype=yaml.ansible :
---
- hosts: localhost
  vars:
    dotfiles: ['vimrc']
    username: '{{ ansible_env.USER }}'

  tasks:
    - name: Configure git
      git_config:
        name: '{{ item.name }}'
        value: '{{ item.value }}'
        scope: global
      loop:
        - {name: 'user.name', value: 'Mario Maia'}
        - {name: 'user.email', value: '101b147ch@gmail.com'}
        - {name: 'core.editor', value: 'vim'}

    - name: Set zsh as default shell
      block:
        - name: "$(which zsh)"
          command: which zsh
          register: which_zsh

        - name: Update user shell
          user:
            name: '{{ username }}'
            shell: '{{ which_zsh.stdout }}'
          become: yes

    - name: "Initialize dotfiles directory"
      git:
        repo: "https://github.com/cenouro/dotfiles"
        dest: "~/dotfiles"
        update: no

    - name: "Backup distro's files"
      shell: mv .{{item}} .{{item}}.distro.back
      args:
        chdir: ~/
        creates: .{{item}}.distro.back
        removes: .{{item}}
      with_items: "{{dotfiles}}"

    - name: "Setup links"
      file:
        src: ~/dotfiles/{{item}}
        path: ~/.{{item}}
        state: link
      with_items: "{{dotfiles}}"

